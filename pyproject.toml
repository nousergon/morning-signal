[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "morning-signal"
dynamic = ["version"]
description = "Auto-generated daily briefing podcast: Claude + web search → script → Polly TTS → S3 + RSS"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
authors = [
    { name = "Brian McMahon" },
]
keywords = ["podcast", "claude", "anthropic", "polly", "rss", "tts", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
]
dependencies = [
    "anthropic>=0.40.0",
    "boto3>=1.35.0",
    "pyyaml>=6.0",
    "typer>=0.12.0",
    # Telegram-routed failure + healthy-completion pings. While the
    # 0.5.0 series is in its rc cycle, pin the rc explicitly; drop
    # the `rc` suffix once 0.5.0 final ships.
    "flow-doctor==0.5.0rc3",
    # Anthropic cost telemetry — token + server-tool fee accounting
    # against a packaged price card. Consumer of
    # ``alpha_engine_lib.cost.record_anthropic_call`` (lifted to lib
    # in v0.33.0 after data + executor became consumers #2 + #3 of the
    # capture pattern morning-signal originated). 0.33 → 0.36 minor
    # bumps add ``pipeline_status``, ``ssm_dispatcher``, and RAG
    # cleanup — none of which morning-signal consumes; ``cost`` and
    # ``trading_calendar`` surfaces are byte-identical across the range.
    # 0.37 ships ``anthropic_payload`` (server-tool ⊥ prefill validator
    # + ``build_messages_payload`` + ``build_web_search_tool`` lift);
    # 0.38.1 is the first PyPI-published patch with that surface (0.38.0
    # auto-tag fired but PyPI upload failed on a too-long description —
    # see alpha-engine-lib #80). Consumed by ``src/morning_signal/claude.py``
    # + ``tests/live_api_smoke.py`` for the L242 chokepoint swap.
    # 0.40.1 makes ``PriceTable.get`` accept the dated snapshot form
    # (``claude-haiku-4-5-20251001``) the Anthropic SDK returns in
    # ``Message.model`` — required for the public-topics-mode Haiku path
    # to record cost telemetry without raising ``PriceCardLookupError``
    # (see alpha-engine-lib #84).
    "alpha-engine-lib>=0.40.1,<0.41",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "moto[ses,s3,sts,ssm]>=5.0.0",
]

[project.scripts]
morning-signal = "morning_signal.cli:main"

[project.urls]
Homepage = "https://github.com/cipher813/morning-signal"
Repository = "https://github.com/cipher813/morning-signal"
Issues = "https://github.com/cipher813/morning-signal/issues"

[tool.hatch.version]
path = "src/morning_signal/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/morning_signal"]

[tool.hatch.build.targets.sdist]
include = [
    "src/morning_signal",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
