[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "morning-signal"
dynamic = ["version"]
description = "Auto-generated daily briefing podcast: Claude + web search → script → Polly TTS → S3 + RSS"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
authors = [
    { name = "Brian McMahon" },
]
keywords = ["podcast", "claude", "anthropic", "polly", "rss", "tts", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
]
dependencies = [
    "anthropic>=0.40.0",
    "boto3>=1.35.0",
    "pyyaml>=6.0",
    "typer>=0.12.0",
    # Telegram-routed failure + healthy-completion pings.
    "flow-doctor==0.6.0",
    # The commodity utilities morning-signal uses (anthropic_payload, cost,
    # trading_calendar) live in the public MIT `krepis` foundation library.
    # morning-signal is MIT and depends down onto krepis (also MIT); the
    # earlier vendored copies under _vendor/nousergon/ are removed. The
    # `openai` extra is required for the openai-transport (OpenAI, OpenRouter)
    # path of krepis.llm.LLMClient — needed by scripts/oss_bakeoff.py
    # (config#1659 Phase B shadow canary) even though production generation
    # stays on the anthropic transport until the bakeoff gate is met.
    # >=0.11.0 for ModelSpec.reasoning (krepis#16) — without it a
    # reasoning-capable OpenRouter candidate can burn its whole output
    # budget on chain-of-thought and return empty content even at a
    # generous max_tokens (reproduced live 2026-07-06 against Kimi K2.6).
    # >=0.11.1 for the server_tool_use_details.web_search_requests fix
    # (krepis#17) — without it usage.web_search_requests always reads 0
    # on OpenRouter regardless of real search activity, permanently
    # breaking the min_web_searches floor on that transport.
    "krepis[anthropic,openai]>=0.11.1",
    "pydantic>=2.0",
    # Pydantic v2 cannot eval PEP 604 `str | None` field annotations under
    # Python 3.9 even with `from __future__ import annotations` (mirrors krepis).
    "eval_type_backport>=0.2.0; python_version < '3.10'",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "moto[ses,s3,sts,ssm]>=5.0.0",
]
# Google Chirp3 HD TTS engine (config tts.engine: google). Kept optional so
# Polly-only installs stay light; tts_google fails loud with an install hint
# if this extra is absent.
google = [
    "google-cloud-texttospeech>=2.16.0",
]

[project.scripts]
morning-signal = "morning_signal.cli:main"

[project.urls]
Homepage = "https://github.com/cipher813/morning-signal"
Repository = "https://github.com/cipher813/morning-signal"
Issues = "https://github.com/cipher813/morning-signal/issues"

[tool.hatch.version]
path = "src/morning_signal/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/morning_signal"]

[tool.hatch.build.targets.sdist]
include = [
    "src/morning_signal",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
