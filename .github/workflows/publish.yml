name: Publish to PyPI

# Publishing triggers on every push to main and is idempotent via
# skip-existing: a version bump in src/morning_signal/__init__.py auto-publishes
# on merge; an unchanged version is a no-op. This eliminates the "forgot to cut
# a tag" lapse that left rc9/rc10/rc11 unpublished (repo at rc11, PyPI at rc8).
# Mirrors the nousergon-lib publish-on-main + skip-existing pattern.
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify artifacts with twine check
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # OIDC trusted-publishing requires id-token: write at the job level.
    # No PYPI_API_TOKEN secret is used — PyPI verifies the workflow identity.
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/morning-signal/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: an unchanged version (no bump this push) is skipped, not
          # an error — so publish-on-every-main-push is safe.
          skip-existing: true
