name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # Cross-repo dep: PyPI first; git@main fallback if a new krepis pin lands
      # before the publish workflow finishes (branch refs go stale after merge).
      - name: Pre-install krepis (PyPI or git fallback)
        run: |
          python -m pip install --upgrade pip
          pip install "krepis[anthropic,openai]>=0.11.2" || \
            pip install "krepis[anthropic,openai] @ git+https://github.com/nousergon/krepis.git@main"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,google]

      - name: Run pytest with coverage
        run: pytest

      - name: Upload coverage to artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
