version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
    groups:
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "moto*"
      tooling:
        patterns:
          - "pytest*"
          - "typer*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
    groups:
      # Bundle all GitHub Actions bumps into one PR per week instead of one
      # PR per action. Routine version bumps don't benefit from per-dep
      # isolation; the CI matrix gates the whole bundle the same way.
      actions:
        patterns: ["*"]
